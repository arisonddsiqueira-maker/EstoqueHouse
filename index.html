<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Stock Mobile</title>
    <style>
        :root { --p: #4361ee; --d: #f72585; --s: #4caf50; --t: #2b2d42; --bg: #f4f7fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--t); -webkit-tap-highlight-color: transparent; }
        header { background: #fff; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; position: sticky; top: 0; z-index: 10; }
        h1 { margin: 0; font-size: 1.2rem; color: var(--p); }
        .container { padding: 10px; max-width: 500px; margin: auto; }
        .card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-zap { background: var(--d); margin-bottom: 15px; display: block; text-align: center; text-decoration: none; }
        .low-stock { border-left: 5px solid var(--d); }
        .badge { float: right; padding: 3px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .bg-low { background: #ffe5ec; color: var(--d); }
        .bg-ok { background: #e8f5e9; color: var(--s); }
        nav { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        nav button { background: none; border: none; color: #888; font-size: 0.7rem; font-weight: bold; padding: 10px; }
        nav button.active { color: #fff; border-bottom: 2px solid #fff; }
        .hidden { display: none !important; }
        .cat-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header><h1>Smart Stock 📦</h1></header>

<div class="container">
    <section id="t-inicio">
        <button id="btn-zap" class="btn btn-zap hidden" onclick="enviarZap()">🛒 ENVIAR LISTA (WHATSAPP)</button>
        
        <div style="display: flex; gap: 5px;">
            <input type="text" id="busca" class="input" placeholder="Buscar..." oninput="renderHome()" style="flex: 2;">
            <select id="filtro-cat" class="input" onchange="renderHome()" style="flex: 1; font-size: 12px;"></select>
        </div>

        <div id="lista-home">
            </div>
    </section>

    <section id="t-cadastro" class="hidden">
        <div class="card">
            <h3>Novo Produto</h3>
            <input type="text" id="p-nome" class="input" placeholder="Nome">
            <input type="text" id="p-marca" class="input" placeholder="Marca">
            <select id="p-cat" class="input"></select>
            <input type="text" id="p-medida" class="input" placeholder="Medida (kg, un, l)">
            <input type="number" id="p-atual" class="input" placeholder="Qtd Atual">
            <input type="number" id="p-ideal" class="input" placeholder="Meta Ideal">
            <button class="btn" onclick="salvar()">SALVAR NO ESTOQUE</button>
        </div>
    </section>

    <section id="t-estoque" class="hidden">
        <div id="lista-estoque"></div>
    </section>

    <section id="t-config" class="hidden">
        <div class="card">
            <h3>Categorias</h3>
            <div style="display:flex; gap:5px;">
                <input type="text" id="new-cat" class="input" placeholder="Nova...">
                <button onclick="addCat()" style="height:44px; padding:0 15px; border-radius: 8px; border: none; background: var(--s); color: white;">+</button>
            </div>
            <div id="lista-cats"></div>
        </div>
    </section>
</div>

<nav>
    <button onclick="mudar('inicio')" id="b-inicio" class="active">INÍCIO</button>
    <button onclick="mudar('cadastro')" id="b-cadastro">NOVO</button>
    <button onclick="mudar('estoque')" id="b-estoque">ESTOQUE</button>
    <button onclick="mudar('config')" id="b-config">CONFIG</button>
</nav>

<script>
    var prods = JSON.parse(localStorage.getItem('ss_p')) || [];
    var cats = JSON.parse(localStorage.getItem('ss_c')) || ["Alimentos", "Limpeza", "Higiene"];

    function persistir() {
        localStorage.setItem('ss_p', JSON.stringify(prods));
        localStorage.setItem('ss_c', JSON.stringify(cats));
        atualizarSelects();
    }

    function atualizarSelects() {
        var h = "";
        var f = '<option value="Todos">Categorias</option>';
        cats.sort().forEach(function(c) {
            h += '<option value="'+c+'">'+c+'</option>';
            f += '<option value="'+c+'">'+c+'</option>';
        });
        document.getElementById('p-cat').innerHTML = h;
        document.getElementById('filtro-cat').innerHTML = f;
    }

    function mudar(tela) {
        document.querySelectorAll('section').forEach(function(s) { s.classList.add('hidden'); });
        document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('active'); });
        
        document.getElementById('t-' + tela).classList.remove('hidden');
        document.getElementById('b-' + tela).classList.add('active');
        
        // Sempre que mudar para o início ou estoque, forçamos a renderização
        if(tela === 'inicio') renderHome();
        if(tela === 'estoque') renderEstoque();
        if(tela === 'config') renderCats();
    }

    function salvar() {
        var n = document.getElementById('p-nome').value;
        if(!n) { alert("Nome vazio!"); return; }
        
        prods.push({
            id: Date.now(),
            n: n,
            m: document.getElementById('p-marca').value,
            c: document.getElementById('p-cat').value,
            u: document.getElementById('p-medida').value || 'un',
            a: parseInt(document.getElementById('p-atual').value) || 0,
            i: parseInt(document.getElementById('p-ideal').value) || 0
        });
        persistir();
        alert("Salvo!");
        document.querySelectorAll('#t-cadastro input').forEach(function(i) { i.value = ''; });
        mudar('inicio');
    }

    function renderHome() {
        var container = document.getElementById('lista-home');
        var busca = document.getElementById('busca').value.toLowerCase();
        var filtro = document.getElementById('filtro-cat').value;
        var html = "";
        var temFalta = false;

        // Limpa a lista antes de começar
        container.innerHTML = "";

        prods.sort(function(a,b) { return a.n.localeCompare(b.n); }).forEach(function(p) {
            var matchBusca = p.n.toLowerCase().indexOf(busca) > -1 || p.m.toLowerCase().indexOf(busca) > -1;
            var matchCat = filtro === "Todos" || p.c === filtro;

            if(matchBusca && matchCat) {
                var falta = p.i - p.a;
                var low = falta > 0;
                if(low) temFalta = true;

                html += '<div class="card ' + (low ? 'low-stock' : '') + '">' +
                        '<span class="badge ' + (low ? 'bg-low' : 'bg-ok') + '">' + (low ? 'FALTA' : 'OK') + '</span>' +
                        '<strong>' + p.n + '</strong><br><small>' + p.m + ' ('+p.c+')</small><br>' +
                        (low ? '<b style="color:var(--d); display:block; margin-top:5px;">Faltam: ' + falta + ' ' + p.u + '</b>' : '<span style="color:var(--s); display:block; margin-top:5px;">Estoque OK</span>') +
                        '<small style="color:#999">Ideal: '+p.i+' | Atual: '+p.a+'</small></div>';
            }
        });

        // Controle do botão do WhatsApp
        var btnZap = document.getElementById('btn-zap');
        if(temFalta) {
            btnZap.classList.remove('hidden');
        } else {
            btnZap.classList.add('hidden');
        }

        container.innerHTML = html || "<p style='text-align:center; color:#999; padding-top:20px;'>Nenhum item para exibir.</p>";
    }

    function renderEstoque() {
        var h = "";
        prods.sort(function(a,b) { return a.n.localeCompare(b.n); }).forEach(function(p) {
            h += '<div class="card"><strong>' + p.n + '</strong>' +
                 '<button onclick="deleteP('+p.id+')" style="float:right; border:none; background:none; color:red; font-weight:bold;">🗑️</button>' +
                 '<div style="margin-top:10px; display:flex; align-items:center; gap:10px;">' +
                 'Qtd: <input type="number" value="'+p.a+'" onchange="atu('+p.id+', this.value)" style="width:65px; padding:5px; border:1px solid #ddd; border-radius:5px;">' +
                 '<small style="color:#888">Meta: '+p.i+' '+p.u+'</small></div></div>';
        });
        document.getElementById('lista-estoque').innerHTML = h || "<p style='text-align:center'>Lista vazia.</p>";
    }

    function atu(id, v) {
        var idx = prods.findIndex(function(x) { return x.id === id; });
        if(idx > -1) {
            prods[idx].a = parseInt(v) || 0;
            persistir();
        }
    }

    function deleteP(id) {
        if(confirm("Excluir?")) { 
            prods = prods.filter(function(x) { return x.id !== id; }); 
            persistir(); 
            renderEstoque(); 
        }
    }

    function addCat() {
        var n = document.getElementById('new-cat').value;
        if(n && cats.indexOf(n) === -1) { 
            cats.push(n); 
            persistir(); 
            renderCats(); 
            document.getElementById('new-cat').value = ""; 
        }
    }

    function renderCats() {
        var h = "";
        cats.sort().forEach(function(c) { 
            h += '<div class="cat-item"><span>'+c+'</span><button onclick="delCat(\''+c+'\')" style="color:red; border:none; background:none; font-weight:bold;">X</button></div>'; 
        });
        document.getElementById('lista-cats').innerHTML = h;
    }

    function delCat(n) {
        if(prods.some(function(p) { return p.c === n; })) { 
            alert("Categoria em uso!"); 
            return; 
        }
        cats = cats.filter(function(c) { return c !== n; }); 
        persistir(); 
        renderCats();
    }

    function enviarZap() {
        var m = "*🛒 MINHA LISTA DE COMPRAS*\n\n";
        var itensFaltantes = false;
        prods.forEach(function(p) { 
            if(p.i > p.a) { 
                m += "• *" + p.n + "*: Faltam " + (p.i - p.a) + " " + p.u + "\n"; 
                itensFaltantes = true;
            } 
        });
        if(itensFaltantes) {
            window.open("https://wa.me/?text=" + encodeURIComponent(m));
        } else {
            alert("Nada faltando no momento!");
        }
    }

    // Inicialização
    persistir();
    renderHome();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Stock</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #f4f7fa; margin: 0; padding-bottom: 100px; color: #2b2d42; }
        header { background: #fff; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; position: sticky; top: 0; z-index: 1001; }
        h1 { margin: 0; font-size: 1.2rem; color: #4361ee; }
        .container { padding: 10px; max-width: 500px; margin: auto; }
        
        .btn-zap { 
            background: #f72585; color: #fff; border: none; padding: 15px; 
            border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; 
            font-size: 1rem; margin-bottom: 15px; display: none; 
        }

        .card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; background: #fff; }
        .btn-blue { background: #4361ee; color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; }
        
        .low-stock { border-left: 5px solid #f72585; }
        .badge { float: right; padding: 3px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; background: #eee; }
        .bg-low { background: #ffe5ec; color: #f72585; }
        .bg-ok { background: #e8f5e9; color: #4caf50; }

        nav { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1002; }
        nav button { background: none; border: none; color: #888; font-size: 0.7rem; font-weight: bold; padding: 10px; cursor: pointer; }
        nav button.active { color: #fff; border-bottom: 2px solid #fff; }
        
        .hidden { display: none !important; }
        .btn-edit { background: none; border: none; color: #4361ee; font-weight: bold; cursor: pointer; margin-right: 10px; }
    </style>
</head>
<body>

<header><h1>Smart Stock 📦</h1></header>

<div class="container">
    <section id="t-inicio">
        <button id="btn-whatsapp" class="btn-zap" onclick="enviarZap()">🛒 ENVIAR LISTA (WHATSAPP)</button>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="busca" class="input" placeholder="Pesquisar..." oninput="renderHome()">
            <select id="filtro-cat" class="input" onchange="renderHome()" style="flex: 1;"></select>
        </div>
        <div id="lista-home"></div>
    </section>

    <section id="t-cadastro" class="hidden">
        <div class="card">
            <h3 id="titulo-form">Novo Produto</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="p-nome" class="input" placeholder="Nome">
            <input type="text" id="p-marca" class="input" placeholder="Marca">
            <select id="p-cat" class="input"></select>
            <input type="text" id="p-medida" class="input" placeholder="Medida (kg, un, l)">
            <input type="number" id="p-atual" class="input" placeholder="Qtd Atual">
            <input type="number" id="p-ideal" class="input" placeholder="Meta Ideal">
            <button id="btn-salvar" class="btn-blue" onclick="salvar()">SALVAR NO ESTOQUE</button>
            <button id="btn-cancelar" class="btn-blue hidden" onclick="cancelarEdicao()" style="background:#888; margin-top:5px;">CANCELAR</button>
        </div>
    </section>

    <section id="t-estoque" class="hidden">
        <div id="lista-estoque"></div>
    </section>

    <section id="t-config" class="hidden">
        <div class="card">
            <h3>Categorias</h3>
            <div style="display:flex; gap:5px;">
                <input type="text" id="new-cat" class="input" placeholder="Nova..." style="margin:0">
                <button onclick="addCat()" style="padding:0 15px; border-radius:8px; border:none; background:#4caf50; color:#fff; font-weight:bold;">+</button>
            </div>
            <div id="lista-cats" style="margin-top:15px;"></div>
        </div>
    </section>
</div>

<nav>
    <button onclick="mudar('inicio')" id="b-inicio" class="active">INÍCIO</button>
    <button onclick="mudar('cadastro')" id="b-cadastro">NOVO</button>
    <button onclick="mudar('estoque')" id="b-estoque">ESTOQUE</button>
    <button onclick="mudar('config')" id="b-config">CAT.</button>
</nav>

<script>
    var prods = JSON.parse(localStorage.getItem('ss_p')) || [];
    var cats = JSON.parse(localStorage.getItem('ss_c')) || ["Alimentos", "Limpeza", "Higiene"];

    function persistir() {
        localStorage.setItem('ss_p', JSON.stringify(prods));
        localStorage.setItem('ss_c', JSON.stringify(cats));
        atualizarSelects();
    }

    function atualizarSelects() {
        var h = "";
        var f = '<option value="Todos">Todas</option>';
        for (var i = 0; i < cats.length; i++) {
            h += '<option value="'+cats[i]+'">'+cats[i]+'</option>';
            f += '<option value="'+cats[i]+'">'+cats[i]+'</option>';
        }
        document.getElementById('p-cat').innerHTML = h;
        document.getElementById('filtro-cat').innerHTML = f;
    }

    function mudar(tela) {
        document.getElementById('t-inicio').classList.add('hidden');
        document.getElementById('t-cadastro').classList.add('hidden');
        document.getElementById('t-estoque').classList.add('hidden');
        document.getElementById('t-config').classList.add('hidden');
        document.getElementById('b-inicio').classList.remove('active');
        document.getElementById('b-cadastro').classList.remove('active');
        document.getElementById('b-estoque').classList.remove('active');
        document.getElementById('b-config').classList.remove('active');
        document.getElementById('t-' + tela).classList.remove('hidden');
        document.getElementById('b-' + tela).classList.add('active');
        if(tela === 'inicio') renderHome();
        if(tela === 'estoque') renderEstoque();
        if(tela === 'config') renderCats();
    }

    function salvar() {
        var idEdit = document.getElementById('edit-id').value;
        var nome = document.getElementById('p-nome').value;
        if(!nome) return alert("Nome obrigatório!");

        var p = {
            id: idEdit ? parseInt(idEdit) : Date.now(),
            n: nome,
            m: document.getElementById('p-marca').value,
            c: document.getElementById('p-cat').value,
            u: document.getElementById('p-medida').value || 'un',
            a: parseInt(document.getElementById('p-atual').value) || 0,
            i: parseInt(document.getElementById('p-ideal').value) || 0
        };

        if(idEdit) {
            for(var x=0; x<prods.length; x++) { if(prods[x].id === p.id) prods[x] = p; }
            alert("Produto atualizado!");
        } else {
            prods.push(p);
            alert("Produto salvo!");
        }

        persistir();
        cancelarEdicao();
        mudar('inicio');
    }

    function editarProd(id) {
        var p = null;
        for(var x=0; x<prods.length; x++) { if(prods[x].id === id) p = prods[x]; }
        if(!p) return;

        document.getElementById('edit-id').value = p.id;
        document.getElementById('p-nome').value = p.n;
        document.getElementById('p-marca').value = p.m;
        document.getElementById('p-cat').value = p.c;
        document.getElementById('p-medida').value = p.u;
        document.getElementById('p-atual').value = p.a;
        document.getElementById('p-ideal').value = p.i;

        document.getElementById('titulo-form').innerText = "Editar Produto";
        document.getElementById('btn-salvar').innerText = "ATUALIZAR DADOS";
        document.getElementById('btn-cancelar').classList.remove('hidden');
        mudar('cadastro');
    }

    function cancelarEdicao() {
        document.getElementById('edit-id').value = "";
        document.getElementById('p-nome').value = "";
        document.getElementById('p-marca').value = "";
        document.getElementById('p-atual').value = "";
        document.getElementById('p-ideal').value = "";
        document.getElementById('titulo-form').innerText = "Novo Produto";
        document.getElementById('btn-salvar').innerText = "SALVAR NO ESTOQUE";
        document.getElementById('btn-cancelar').classList.add('hidden');
    }

    function renderHome() {
        var container = document.getElementById('lista-home');
        var busca = document.getElementById('busca').value.toLowerCase();
        var filtro = document.getElementById('filtro-cat').value;
        var html = "";
        var temFalta = false;

        for (var i = 0; i < prods.length; i++) {
            var p = prods[i];
            if ((p.n.toLowerCase().indexOf(busca) !== -1 || p.m.toLowerCase().indexOf(busca) !== -1) && (filtro === "Todos" || p.c === filtro)) {
                var falta = p.i - p.a;
                var low = falta > 0;
                if (low) temFalta = true;
                html += '<div class="card '+(low?'low-stock':'')+'"><span class="badge '+(low?'bg-low':'bg-ok')+'">'+(low?'FALTA':'OK')+'</span>' +
                        '<strong>'+p.n+'</strong><br><small>'+p.m+' ('+p.c+')</small><br>' +
                        (low?'<b style="color:#f72585; display:block; margin-top:5px;">Faltam: '+falta+' '+p.u+'</b>':'<span style="color:#4caf50; display:block; margin-top:5px;">Estoque OK</span>') +
                        '<small style="color:#999">Ideal: '+p.i+' | Atual: '+p.a+'</small></div>';
            }
        }
        document.getElementById('btn-whatsapp').style.display = temFalta ? "block" : "none";
        container.innerHTML = html || "<p style='text-align:center; color:#999;'>Nenhum item.</p>";
    }

    function renderEstoque() {
        var h = "";
        var ordenados = prods.slice().sort(function(a,b){ return a.n.localeCompare(b.n); });
        for (var i = 0; i < ordenados.length; i++) {
            var p = ordenados[i];
            h += '<div class="card"><strong>'+p.n+'</strong>' +
                 '<div style="float:right;"><button class="btn-edit" onclick="editarProd('+p.id+')">✏️</button>' +
                 '<button onclick="deleteP('+p.id+')" style="border:none; background:none; color:red; font-weight:bold;">🗑️</button></div>' +
                 '<div style="margin-top:10px; display:flex; align-items:center; gap:10px;">' +
                 'Qtd: <input type="number" value="'+p.a+'" onchange="atu('+p.id+', this.value)" style="width:65px; padding:5px; border:1px solid #ddd; border-radius:8px;">' +
                 '<small style="color:#888">Meta: '+p.i+' '+p.u+'</small></div></div>';
        }
        document.getElementById('lista-estoque').innerHTML = h || "<p style='text-align:center'>Vazio.</p>";
    }

    function deleteP(id) { if(confirm("Excluir item?")) { prods = prods.filter(function(x){return x.id!==id;}); persistir(); renderEstoque(); } }
    function atu(id, v) { for(var x=0; x<prods.length; x++) { if(prods[x].id === id) prods[x].a = parseInt(v)||0; } persistir(); }
    function addCat() { var n = document.getElementById('new-cat').value; if(n && cats.indexOf(n)===-1){ cats.push(n); persistir(); renderCats(); document.getElementById('new-cat').value=""; } }
    function renderCats() { var h = ""; for (var i=0; i<cats.length; i++) { h += '<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;"><span>'+cats[i]+'</span><button onclick="delCat(\''+cats[i]+'\')" style="color:red; border:none; background:none; font-weight:bold;">X</button></div>'; } document.getElementById('lista-cats').innerHTML = h; }
    function delCat(n) { if(prods.some(function(p){return p.c===n;})){alert("Em uso!"); return;} cats=cats.filter(function(c){return c!==n;}); persistir(); renderCats(); }
    function enviarZap() { var m = "*🛒 LISTA DE COMPRAS*\n\n"; var tem = false; for(var i=0; i<prods.length; i++){ var p=prods[i]; if(p.i > p.a){ m += "• *"+p.n+"*: Faltam "+(p.i-p.a)+" "+p.u+"\n"; tem=true; } } if(tem) window.open("https://wa.me/?text="+encodeURI(m)); }

    persistir();
    renderHome();
</script>
</body>
</html>

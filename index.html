<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Stock Pro</title>
    <style>
        :root { --p: #4361ee; --d: #f72585; --s: #4caf50; --t: #2b2d42; --bg: #f4f7fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--t); }
        header { background: #fff; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; position: sticky; top:0; z-index:10; }
        h1 { margin: 0; font-size: 1.2rem; color: var(--p); }
        .container { padding: 10px; max-width: 500px; margin: auto; }
        .card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; }
        .input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-zap { background: var(--d); margin-bottom: 15px; }
        .low-stock { border-left: 5px solid var(--d); }
        .badge { float: right; padding: 3px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .bg-low { background: #ffe5ec; color: var(--d); }
        .bg-ok { background: #e8f5e9; color: var(--s); }
        nav { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        nav button { background: none; border: none; color: #888; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        nav button.active { color: #fff; }
        .hidden { display: none !important; }
        .backup-btn { background: #eee; color: #666; font-size: 0.6rem; padding: 5px; border: 1px solid #ccc; margin-top: 20px; border-radius: 5px; width: 100%; }
    </style>
</head>
<body>

<header><h1>Smart Stock 📦</h1></header>
